<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dangerous Creatures — reborn</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .cover { text-align: center; padding: 60px 20px 22px; }
    .cover h1 { font-family: var(--font-display); font-size: clamp(44px, 8.5vw, 92px); margin: 0; line-height: .95; font-weight: 700; }
    .cover h1 b { color: var(--rust); }
    .cover p { color: var(--ink-soft); font-size: 20px; max-width: 620px; margin: 14px auto 18px; }
    .grid { margin: 14px 0 60px; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="cover">
      <h1><b>Dangerous</b><br>Creatures</h1>
      <p>The classic 1994 wildlife explorer, reborn for the web — so any kid can meet the planet's most fascinating animals.</p>
      <nav class="explore-nav">
        <a class="btn" href="browse.html?tab=regions">🌍 By Region</a>
        <a class="btn" href="browse.html?tab=habitats">🌿 By Habitat</a>
        <a class="btn" href="browse.html?tab=weapons">⚔️ By Weapon</a>
      </nav>
    </div>
    <div class="grid" id="grid"><p class="loading">Gathering the creatures…</p></div>
    <footer style="text-align:center; padding: 4px 0 80px;">
      <a href="making-of.html" style="color: var(--ink-soft); font-size: 16px;">✦ The Making Of — how a 1994 CD-ROM came back to life</a>
    </footer>
  </main>
  <script>
    fetch("data/index.json")
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((list) => {
        const grid = document.getElementById("grid");
        grid.innerHTML = "";
        for (const c of list) {
          const a = document.createElement("a");
          a.className = "creature";
          a.href = `animal.html?id=${c.id}`;
          a.innerHTML = `<img src="${c.thumb}" alt="${c.name}" loading="lazy" /><span>${c.name}</span>`;
          grid.append(a);
        }
      })
      .catch(() => {
        document.getElementById("grid").innerHTML =
          '<a class="creature" href="animal.html?id=lion"><img src="assets/lion/LION06TV.png" alt="Lion"/><span>Lion</span></a>';
      });
  </script>
</body>
</html>
